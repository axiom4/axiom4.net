<div class="row mt-2">
  <div class="article col-lg-9 p-lg-5 pt-1">
    @if (post(); as p) {
      <article>
        <figure class="text-left">
          <blockquote class="blockquote">
            <h1>{{ p.title }}</h1>
          </blockquote>
          <figcaption class="blockquote-footer">
            <small
              >author:
              <strong
                >{{ p.author.username }} -
                <cite title="Source Title">{{
                  p.created_at | date
                }}</cite></strong
              ></small
            >
          </figcaption>
        </figure>
        <div class="mt-4" [innerHTML]="p.body | marked"></div>
      </article>
    }
  </div>
  <div class="col-lg-3 text-center">
    <img
      src="/assets/images/logo-160.webp"
      srcset="/assets/images/logo-160.webp 1x, /assets/images/logo.jpeg 2x"
      alt="axiom4.net"
      class="img-fluid sidebar-logo"
      loading="lazy"
    />
    <hr class="tag-cloud-separator" />
    <app-tag-cloud></app-tag-cloud>
  </div>
</div>
