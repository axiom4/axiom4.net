<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- LCP preload: fires before Angular boots, overlapping image download with JS execution.
         /api/lcp/ returns the latest post's image path (5-min public cache).
         The <link rel="preload"> is injected into <head> as soon as the response arrives. -->
    <script>
      !(function () {
        fetch("/api/lcp/", { priority: "high" })
          .then(function (r) {
            return r.ok ? r.json() : null;
          })
          .then(function (d) {
            if (d && d.path) {
              var p = d.path,
                l = document.createElement("link");
              l.rel = "preload";
              l.as = "image";
              l.type = "image/webp";
              l.href = "/api/thumb/900/" + p;
              l.setAttribute(
                "imagesrcset",
                "/api/thumb/480/" + p + " 480w, /api/thumb/900/" + p + " 900w",
              );
              l.setAttribute("imagesizes", "(max-width:572px) 96vw, 50vw");
              document.head.appendChild(l);
            }
          })
          .catch(function () {});
      })();
    </script>
    <title>axiom4.net</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Welcome to my security Blog. On this site you will be able to acquire many notions on operating systems, web components and computer security."
    />
    <link rel="icon" type="image/x-icon" href="/favicon.png" />
    <link rel="preconnect" href="/" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="shortcut icon" href="/assets/icons/icon-384x384.png" />
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
  </head>

  <body>
    <app-root ngCspNonce="random_nonce_value"></app-root>
    <noscript>
      Please enable JavaScript to continue using this application.
    </noscript>
  </body>
</html>
